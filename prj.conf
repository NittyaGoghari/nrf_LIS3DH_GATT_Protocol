# ==========================================
# SYSTEM & MEMORY (Tuned for nRF52832)
# ==========================================
CONFIG_PM_DEVICE=y
CONFIG_DEBUG_OPTIMIZATIONS=y
CONFIG_COMPILER_OPT=""
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=1024
CONFIG_HEAP_MEM_POOL_SIZE=2048

# ==========================================
# LOGGING & CONSOLE (UART)
# ==========================================
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_CBPRINTF_FP_SUPPORT=y

# ==========================================
# HARDWARE SUBSYSTEMS & DRIVERS
# ==========================================
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LIS2DH=y
CONFIG_ADC=y

# ==========================================
# BLUETOOTH CORE & GATT
# ==========================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Activity_D1"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_CLIENT=n
CONFIG_BT_L2CAP_TX_MTU=65

# ==========================================
# BLUETOOTH SECURITY & BONDING
# ==========================================
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y

# ==========================================
# FLASH & SETTINGS (for bond persistence)
# ==========================================
CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y